version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_models:/app/models
    environment:
      - UPLOAD_DIR=./uploads
      - ARTIFACTS_DIR=./models
      
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
  backend_models:
